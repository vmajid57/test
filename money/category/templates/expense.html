<head>
	<title>Expense</title>
	<style>
		table, td, th {
  			border: 1px solid;
		}
		#report {
			margin: 3rem;
			padding: 1rem;
			height: 20rem;
			width: 75rem;
			background-color: #d5f5e3;
			overflow-y: hidden;
		}

		#table {
			width: 100%;
			border-collapse: collapse;

		}
	</style>
</head>
<body>
	<div id = "form">
		<form action="" method="post">
		{% csrf_token %}
		{{ form.as_p}}
		<input type="submit" value="Submit">
		</form>
	</div>

	<div id = "report">
		<table id = "table">
			<tr>
				<th>Source</th>
				<th>Price</th>
			</tr>
			<!-- loop in value of cat. the value is dict -->
			{% for a in cat %}
				<tr>
					<td>{{ a.source }}</td>
					<td>{{ a.price }}</td>
				</tr>
			{% endfor %}
		</table>
	</div>
</body>
</html>
